spring:
  application:
    name: flashlink
  web:
    resources:
      static-locations: classpath:/static/
  profiles:
    active: dev

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-value: 1
      logic-not-delete-value: 0
      logic-delete-field: is_deleted